        <h2>Ingredients</h2>
        <ul>
            <li>Tea leaves</li>
            <li>Milk</li>
            <li>Sugar</li>
        </ul>
        <h2>Steps</h2>
        <ol>
            <li>Make milk slightly hot</li>
            <li>Add one spoon tea leaves</li>
            <li>Add two spoon sugar</li>
            <li>Remove when it begins to swell</li>
        </ol>
