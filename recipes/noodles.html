        <p>Instant noodles to make within ten minutes</p>
        <h2>Ingredients</h2>
        <ul>
            <li>Noodles</li>
            <li>Spice</li>
            <li>hot water</li>
        </ul>
        <h2>Steps</h2>
        <ol>
            <li>Make water hot</li>
            <li>Put spice + noodles in.</li>
            <li>Stir every few minutes</li>
            <li>Remove when water evaporates</li>
        </ol>
